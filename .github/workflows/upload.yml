name: TikTok Auto Upload

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL Video"
        required: false
        default: "https://v1.pinimg.com/videos/iht/expMp4/b7/b4/4b/b7b44b6222612c40a5b30fd7e991cb4f_720w.mp4"
      description:
        description: "Caption / Deskripsi Video"
        required: false
        default: "Video keren! #fyp #viral"

jobs:
  upload:
    name: Upload Video ke TikTok
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: 🍪 Setup TikTok Cookies
        run: |
          echo '${{ secrets.TIKTOK_COOKIES_JSON }}' > cookies.json
          echo "✅ cookies.json dibuat"
          echo "📄 Jumlah cookies: $(python -c "import json; print(len(json.load(open('cookies.json'))))")"

      - name: 🚀 Upload Video ke TikTok
        run: |
          python uploader.py \
            --url "${{ github.event.inputs.video_url }}" \
            --description "${{ github.event.inputs.description }}" \
            --cookies cookies.json \
            --headless

      - name: 📸 Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-upload-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 30

      - name: 📋 Daftar Screenshot
        if: always()
        run: ls -la screenshots/ 2>/dev/null || echo "Tidak ada screenshot"
